spring.application.name=scunsis-backend

spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=${URL_DB}
spring.datasource.username=${USER_DB}
spring.datasource.password=${PASS_DB}
spring.datasource.driver-class-name=org.postgresql.Driver
server.port=${SERVER_PORT}

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.max-file-size=${MAX_FILE}
spring.servlet.multipart.max-request-size=${MAX_FILE}

springdoc.swagger-ui.path=/swagger-ui.html

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION}
app.pdf.generated-dir=${PDF_PATH_SAVE}

app.seed.admin-password=${ADMIN_PASSWORD}
app.seed.capturista-password=${CAPTURISTA_PASSWORD}
